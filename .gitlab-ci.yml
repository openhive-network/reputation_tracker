stages:
- detect
- lint
- build
- sync
- test
- cleanup
- publish

variables:
  # Variables required by Common CI jobs
  CI_COMMON_JOB_VERSION: "3dd346380da7f28cdaf3ef3955559c905d94bd1c"
  DOCKER_BUILDER_TAG: "$CI_COMMON_JOB_VERSION"
  DOCKER_DIND_TAG: "$CI_COMMON_JOB_VERSION"
  IMAGE_REMOVER_TAG: "$CI_COMMON_JOB_VERSION"
  # Git configuration
  # Fetch strategy reuses workspace between jobs, reducing GitLab server load.
  # Full clone (depth 0) enables efficient incremental fetches - shallow clones
  # don't reduce server CPU and make fetch less effective.
  GIT_STRATEGY: fetch
  GIT_SUBMODULE_STRATEGY: none  # HAF submodule no longer needed
  GIT_DEPTH: 0
  # Temporary: separate clone path prevents clone-strategy jobs from erasing
  # fetch workspaces during transition. Remove once all projects use fetch.
  GIT_CLONE_PATH: $CI_BUILDS_DIR/fetch/$CI_RUNNER_SHORT_TOKEN/$CI_CONCURRENT_ID/$CI_PROJECT_PATH
  # HAF configuration
  DATA_CACHE_HAF_PREFIX: "/cache/replay_data_haf"
  # NFS cache configuration for sync data sharing across builders
  DATA_CACHE_NFS_PREFIX: "/nfs/ci-cache"
  REPTRACKER_CACHE_KEY: "${HAF_COMMIT}_${CI_COMMIT_SHORT_SHA}"
  # Prefixed with haf_ for automatic pgdata permission handling in cache-manager
  REPTRACKER_SYNC_CACHE_TYPE: "haf_reptracker_sync"
  # Aliases for DinD test templates (Phase 4)
  APP_SYNC_CACHE_TYPE: "${REPTRACKER_SYNC_CACHE_TYPE}"
  APP_CACHE_KEY: "${REPTRACKER_CACHE_KEY}"
  HAF_APP_SCHEMA: "reptracker_app"
  HAF_APP_ROLE_PREFIX: "reptracker"
  BLOCK_LOG_SOURCE_DIR_5M: /blockchain/block_log_5m
  FF_NETWORK_PER_BUILD: 1
  # uses registry.gitlab.syncad.com/hive/haf/ci-base-image:ubuntu24.04-1
  BUILDER_IMAGE_TAG: "$TEST_HAF_IMAGE_TAG"
  BUILDER_IMAGE_PATH: "registry.gitlab.syncad.com/hive/haf/ci-base-image${BUILDER_IMAGE_TAG}"
  # Python 3.14 image for API client generation and tests
  # uses registry.gitlab.syncad.com/hive/hive/ci-base-image:ubuntu24.04-py3.14-1
  PYTHON_IMAGE_TAG: "@sha256:64bc6a41d7811e6caace5fed8c82ca1ee6c26bfdcae8b29546d830a63bfe1f17"
  PYTHON_IMAGE: "registry.gitlab.syncad.com/hive/hive/ci-base-image${PYTHON_IMAGE_TAG}"
  # Python 3.14 compatibility - allow PyO3-based packages to build
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
  # =============================================================================
  # Upstream Image Detection (No Submodules Required)
  # =============================================================================
  # HAF image is dynamically detected by find_haf_image job using
  # common-ci-configuration scripts. No manual updates needed - always uses
  # the latest built image from HAF repo.
  #
  # Output variables (set by find_haf_image job):
  #   HAF_UPSTREAM_IMAGE, HAF_UPSTREAM_COMMIT, HAF_UPSTREAM_TAG
  # Enable CI-specific PostgreSQL config with reduced memory for HAF service containers
  HAF_CI_MODE: "1"
  # Common CI configuration reference
  COMMON_CI_REF: "develop"
  # =============================================================================
  # QUICK TEST MODE
  # =============================================================================
  # Two ways to skip heavy jobs and use cached HAF data:
  #
  # 1. AUTOMATIC: When only tests/docs/SQL change, heavy jobs are skipped
  #    and cached HAF data is used. No configuration needed.
  #
  # 2. MANUAL: Set QUICK_TEST=true to force skip mode with a specific cache:
  #    - QUICK_TEST=true
  #    - QUICK_TEST_HAF_COMMIT=<sha>  (required - find with list-haf-caches.sh)
  #
  # Find available caches: ssh hive-builder-10 'ls -lt /nfs/ci-cache/haf/*.tar | head -5'
  # =============================================================================
  QUICK_TEST: "false"
  QUICK_TEST_HAF_COMMIT: ""   # Required when QUICK_TEST=true
  # Auto-populated by detect_changes job:
  AUTO_SKIP_BUILD: "false"    # Set to true when only tests/docs/SQL changed
  AUTO_CACHE_COMMIT: ""       # Most recent cached HAF commit
  # Cache manager configuration (from common-ci-configuration)
  CACHE_MANAGER: "/tmp/cache-manager.sh"
  CACHE_MANAGER_REF: "develop"

include:
- template: Workflows/Branch-Pipelines.gitlab-ci.yml
# All CI templates from common-ci-configuration
- project: 'hive/common-ci-configuration'
  ref: develop
  file:
    - '/templates/base.gitlab-ci.yml'
    - '/templates/docker_image_jobs.gitlab-ci.yml'
    - '/templates/haf_data_preparation.gitlab-ci.yml'
    - '/templates/cache_cleanup.gitlab-ci.yml'
    - '/templates/python_projects.gitlab-ci.yml'
    - '/templates/npm_projects.gitlab-ci.yml'
    - '/templates/test_jobs.gitlab-ci.yml'
    - '/templates/haf_app_testing.gitlab-ci.yml'
    - '/templates/source_change_detection.gitlab-ci.yml'

default:
  hooks:
    pre_get_sources_script:
      # Disable recursive submodule fetching - HAF has nested submodules with relative URLs
      # that cause "transport 'file' not allowed" errors during fetch operations
      - git config --global fetch.recurseSubmodules false
      # Clean corrupt git state left by cancelled pipelines (see GitLab #296638, #4600)
      # Wrapped in subshell to avoid changing working directory for subsequent git operations
      - |
        (
        cd "${CI_PROJECT_DIR:-/builds}" 2>/dev/null || exit 0
        echo "pre_get_sources: checking $(pwd) for corrupt git state"
        if [ -d ".git" ]; then
          # Remove stale lock files that block git operations
          find .git -name "*.lock" -delete 2>/dev/null || true

          # Check if main repo is corrupt - if so, remove .git to force fresh clone
          if ! git rev-parse HEAD >/dev/null 2>&1; then
            echo "pre_get_sources: main repository corrupt, forcing fresh clone"
            rm -rf .git
          else
            # Main repo OK - check and clean corrupt submodules
            # Check both the working dir and .git/modules/ since either can be corrupt
            if [ -f ".gitmodules" ]; then
              git config --file .gitmodules --get-regexp path 2>/dev/null | awk '{print $2}' | while read submod; do
                needs_clean=false
                [ -z "$submod" ] && continue
                # Check if submodule working directory exists but is corrupt
                if [ -d "$submod" ] && [ -f "$submod/.git" ]; then
                  if ! git -C "$submod" rev-parse HEAD >/dev/null 2>&1; then
                    needs_clean=true
                  fi
                fi
                # Check if .git/modules exists but is corrupt (even if working dir is gone)
                if [ -d ".git/modules/$submod" ]; then
                  if ! git --git-dir=".git/modules/$submod" rev-parse HEAD >/dev/null 2>&1; then
                    echo "pre_get_sources: $submod corrupt (rev-parse failed)"
                    needs_clean=true
                  fi
                fi
                if [ "$needs_clean" = true ]; then
                  echo "pre_get_sources: cleaning corrupt submodule: $submod"
                  rm -rf "$submod" ".git/modules/$submod"
                fi
              done
            fi
            echo "pre_get_sources: existing repo OK"
          fi
        else
          echo "pre_get_sources: no .git directory (fresh workspace)"
        fi
        )

# =============================================================================
# DETECT CHANGES - Determines if heavy jobs can be skipped
# =============================================================================
detect_changes:
  extends: .haf_app_detect_changes
  variables:
    # Skip patterns: tests, docs, markdown files, CI config
    HAF_APP_SKIP_PATTERNS: '^tests/|^docs/|\.md$|^README|^CHANGELOG|^LICENSE|^\.gitlab-ci\.yml$'
  tags:
  - public-runner-docker

# =============================================================================
# Dynamic Upstream Image Detection
# =============================================================================
# Automatically finds the latest HAF image by scanning registry and analyzing
# which commits changed source files. Uses .find_upstream_image template from
# common-ci-configuration.
#
# Outputs HAF_UPSTREAM_* variables (HAF_UPSTREAM_IMAGE, HAF_UPSTREAM_COMMIT, etc.)
# =============================================================================
find_haf_image:
  extends: .find_haf_image
  stage: detect

# =============================================================================
# LINT JOBS - Using common-ci-configuration templates
# =============================================================================

lint_bash_scripts:
  extends: .haf_app_lint_bash
  stage: lint
  variables:
    LINT_SCRIPTS_DIR: "."
    LINT_EXCLUDE_PATHS: "haf"

lint_sql_scripts:
  extends: .haf_app_lint_sql
  stage: lint

# Note: HAF image is now dynamically detected by find_haf_image job.
# No manual validation needed.

# Use existing HAF image from registry (no submodule needed)
prepare_haf_image:
  stage: build
  image: alpine:latest
  needs:
    - job: find_haf_image
      artifacts: true
  script:
    - |
      # Use dynamically detected HAF image from find_haf_image job
      echo "Using HAF image: ${HAF_UPSTREAM_IMAGE}"
      echo "HAF commit: ${HAF_UPSTREAM_COMMIT}"
      # Export image name and tag for Docker Compose scripts
      echo "HAF_IMAGE_NAME=${HAF_UPSTREAM_IMAGE}" > docker_image_name.env
      echo "HAF_REGISTRY_TAG=${HAF_UPSTREAM_TAG}" >> docker_image_name.env
      # Also export HAF_COMMIT for cache key compatibility
      echo "HAF_COMMIT=${HAF_UPSTREAM_COMMIT}" >> docker_image_name.env
  artifacts:
    reports:
      dotenv: docker_image_name.env
    paths:
      - docker_image_name.env
  tags:
  - public-runner-docker

extract-swagger-json:
  extends: .filter_out_swagger_json
  stage: build
  variables:
    INPUT_SQL_SWAGGER_FILE: "${CI_PROJECT_DIR}/endpoints/endpoint_schema.sql"
  tags:
  - public-runner-docker

generate_python_api_client:
  extends: .configuration_template
  stage: build
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  needs:
  - job: extract-swagger-json
    artifacts: true
  before_script:
  - !reference [.configuration_template, before_script]
  - poetry -C "${PYPROJECT_DIR}" lock
  - poetry -C "${PYPROJECT_DIR}" install
  script:
  - ${PYPROJECT_DIR}/generate_reputation_api_client.sh
  artifacts:
    paths:
    - "${PYPROJECT_DIR}/reputation_api"
  tags:
  - public-runner-docker

build_python_api_client_wheel:
  extends: .build_wheel_template
  stage: build
  needs:
  - job: generate_python_api_client
    artifacts: true
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  tags:
  - public-runner-docker

generate-wax-spec:
  extends: .generate_swagger_package
  stage: build
  variables:
    # Use artifact path directly - dotenv BUILT_JSON_SWAGGER_FILE contains absolute
    # path from previous job's runner which doesn't exist on this runner
    INPUT_JSON_SWAGGER_FILE: "${CI_PROJECT_DIR}/build/swagger-doc.json"
    API_TYPE: "rest"
    NAMESPACE: "reputation_tracker"
    NPM_PACKAGE_SCOPE: "@hiveio"
    NPM_PACKAGE_NAME: "wax-api-reputation-tracker"
  needs:
  - job: extract-swagger-json
    artifacts: true
  tags:
  - public-runner-docker

prepare_haf_data:
  extends: .prepare_haf_data_5m
  needs:
  - job: detect_changes
    artifacts: true
    optional: true
  - job: prepare_haf_image
    artifacts: true
  stage: build
  timeout: 80m
  variables:
    BLOCK_LOG_SOURCE_DIR: $BLOCK_LOG_SOURCE_DIR_5M
    # Config fetched from hive repo by template if not specified locally
  # Note: The .prepare_haf_data_5m template already has caching logic
  # that skips replay if data exists. No additional skip logic needed.
  tags:
  - public-runner-docker
  - data-cache-storage
  - fast

.docker-build-template:
  extends: .docker_image_builder_job_template
  stage: build
  variables:
    BASE_REPO_NAME: ""
    BASE_TAG: ""
    NAME: ""
    TARGET: "$NAME"
    PROGRESS_DISPLAY: "plain"
  before_script:
  - !reference [.docker_image_builder_job_template, before_script]
  - |
    echo -e "\e[0Ksection_start:$(date +%s):login[collapsed=true]\r\e[0KLogging to Docker registry..."
    docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    echo -e "\e[0Ksection_end:$(date +%s):login\r\e[0K"
  script:
  - |
    echo -e "\e[0Ksection_end:$(date +%s):tag\r\e[0K"
    echo -e "\e[0Ksection_start:$(date +%s):build[collapsed=true]\r\e[0KBaking $NAME${BASE_REPO_NAME:+/$BASE_REPO_NAME} image..."
    function image-exists() {
      local image=$1
      docker manifest inspect "$1" > /dev/null
      return $?
    }
    if image-exists "$CI_REGISTRY_IMAGE${NAME:+/$NAME}${BASE_REPO_NAME:+/$BASE_REPO_NAME}:$BASE_TAG"; then
      echo "Image $CI_REGISTRY_IMAGE${NAME:+/$NAME}${BASE_REPO_NAME:+/$BASE_REPO_NAME}:${BASE_TAG} already exists. Skipping..."
      if [[ -n "$CI_COMMIT_TAG" && "$TARGET" == "full-ci" ]]; then
        echo "Tagging pre-existing image with Git tag..."
        docker pull "$CI_REGISTRY_IMAGE${NAME:+/$NAME}${BASE_REPO_NAME:+/$BASE_REPO_NAME}:${BASE_TAG}"
        docker tag "$CI_REGISTRY_IMAGE${NAME:+/$NAME}${BASE_REPO_NAME:+/$BASE_REPO_NAME}:${BASE_TAG}" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
        docker push "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
      fi
    else
      echo "Baking $CI_REGISTRY_IMAGE${NAME:+/$NAME}${BASE_REPO_NAME:+/$BASE_REPO_NAME}:${BASE_TAG} image..."
      git config --global --add safe.directory $(pwd)
      scripts/ci-helpers/build_docker_image.sh "$CI_PROJECT_DIR"
    fi
    echo -e "\e[0Ksection_end:$(date +%s):build\r\e[0K"
  tags:
  - bigjob

docker-ci-runner-build:
  extends: .docker-build-template
  variables:
    BASE_REPO_NAME: ""
    BASE_TAG: "docker-24.0.1-8"
    NAME: "ci-runner"
    TARGET: "ci-runner-ci"
  tags:
  - public-runner-docker

docker-setup-docker-image-build:
  extends: .docker-build-template
  variables:
    GIT_SUBMODULE_STRATEGY: none
    GIT_DEPTH: 1
    BASE_REPO_NAME: ""
    BASE_TAG: "$CI_COMMIT_SHORT_SHA"
    NAME: ""
    TARGET: "full-ci"
  tags:
  - public-runner-docker

sync:
  extends:
  - .docker_image_builder_job_template
  - .haf_app_sync_variables
  stage: sync
  image: registry.gitlab.syncad.com/hive/reputation_tracker/ci-runner:docker-24.0.1-8
  needs:
  - job: detect_changes
    artifacts: true
    optional: true
  - job: prepare_haf_image
    artifacts: true
  - job: prepare_haf_data
    artifacts: true
  - docker-setup-docker-image-build
  - docker-ci-runner-build
  variables:
    BACKEND_VERSION: "$CI_COMMIT_SHORT_SHA"
    POSTGRES_ACCESS: postgresql://haf_admin@docker:5432/haf_block_log
    COMPOSE_OPTIONS_STRING: --env-file ci.env --file docker-compose.yml --file overrides/dev.yml
      --ansi never
    # Aliases for sync templates
    APP_SYNC_CACHE_TYPE: "${REPTRACKER_SYNC_CACHE_TYPE}"
    APP_CACHE_KEY: "${REPTRACKER_CACHE_KEY}"
  timeout: 2 hours  # NFS cache push can take 50+ minutes on slow days
  before_script:
  - !reference [.haf_app_sync_setup, script]
  - !reference [.haf_app_smart_cache_lookup, script]
  script:
  - |
    CACHE_HIT=$(cat /tmp/cache_hit 2>/dev/null || echo "false")

    echo -e "\e[0Ksection_start:$(date +%s):compose[collapsed=true]\r\e[0KStarting the test environment..."

    # cache-manager extracted directly to job directory with block_log symlinks and pgdata permissions fixed
    echo "Data ready at DATADIR=${DATADIR}"
    ls -la "${DATADIR}/" || true

    # Relocate shm_dir from inside datadir to be a sibling (for old cache formats)
    if [[ -d "${DATADIR}/shm_dir" ]] && [[ ! -d "${SHM_DIR}" ]]; then
      echo "Relocating shm_dir to parallel location..."
      mv "${DATADIR}/shm_dir" "${SHM_DIR}"
    fi
    ls -la "${SHM_DIR}/" || true

    # Docker Compose bind mounts docker/blockchain over datadir/blockchain.
    # Copy blockchain files there so HAF can see them.
    # Use cp -aL to dereference symlinks (copy actual files, not symlink references)
    echo "Copying blockchain files to docker/blockchain..."
    rm -rf "${CI_PROJECT_DIR}/docker/blockchain"/*
    cp -aL "${DATADIR}/blockchain"/* "${CI_PROJECT_DIR}/docker/blockchain/"
    ls -la "${CI_PROJECT_DIR}/docker/blockchain/"

    # Remove blockchain dir from datadir so Docker volume mount doesn't conflict
    sudo rm -rf "${DATADIR}/blockchain"

    "${CI_PROJECT_DIR}/scripts/ci-helpers/start-ci-test-environment.sh"

    echo -e "\e[0Ksection_end:$(date +%s):compose\r\e[0K"
  - |
    if [[ "$CACHE_HIT" == "true" ]]; then
      echo "Cache hit - reputation_tracker already synced, skipping wait"
    else
      echo -e "\e[0Ksection_start:$(date +%s):wait[collapsed=true]\r\e[0KWaiting for reputation tracker..."
      "${CI_PROJECT_DIR}/scripts/ci-helpers/wait-for-rt-startup.sh"
      echo -e "\e[0Ksection_end:$(date +%s):wait\r\e[0K"
    fi
  # Shutdown and save cache using templates
  - !reference [.haf_app_sync_shutdown, script]
  - !reference [.haf_app_sync_save_cache_conditional, script]
  after_script: !reference [.haf_app_sync_cleanup, after_script]
  artifacts: !reference [.haf_app_sync_artifacts, artifacts]
  tags:
  - public-runner-docker
  - data-cache-storage
  - fast

# =============================================================================
# DinD Test Template
# =============================================================================
# Test jobs extract the exact cache created by the sync job in this pipeline.
# No fallback to caches from other app versions - the cache key includes both
# HAF commit and app commit to ensure schema compatibility.
.test-with-docker-compose:
  extends:
    - .docker_image_builder_job_template
    - .haf_app_dind_test_variables
  stage: test
  image: registry.gitlab.syncad.com/hive/reputation_tracker/ci-runner:docker-24.0.1-8
  variables:
    COMPOSE_OPTIONS_STRING: "--file docker-compose-test.yml --ansi never"
  timeout: 30 minutes
  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - |
      echo -e "\e[0Ksection_start:$(date +%s):login[collapsed=true]\r\e[0KLogging to Docker registry..."
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
      echo -e "\e[0Ksection_end:$(date +%s):login\r\e[0K"
    # Cache extraction using shared script from common-ci-configuration
    - !reference [.fetch_extract_test_cache, before_script]
    - |
      echo -e "\e[0Ksection_start:$(date +%s):extract[collapsed=true]\r\e[0KExtracting cache for DinD test..."
      JOB_DIR="${CI_PROJECT_DIR}/${CI_JOB_ID}"
      mkdir -p "${JOB_DIR}"

      # Use shared extract-test-cache.sh script (exact key match only)
      $EXTRACT_TEST_CACHE "${APP_SYNC_CACHE_TYPE}" "${APP_CACHE_KEY}" "${JOB_DIR}"

      # Relocate shm_dir from inside datadir to be a sibling (for old cache formats)
      if [[ -d "${HAF_DATA_DIRECTORY}/shm_dir" ]] && [[ ! -d "${HAF_SHM_DIRECTORY}" ]]; then
        echo "Relocating shm_dir to parallel location..."
        mv "${HAF_DATA_DIRECTORY}/shm_dir" "${HAF_SHM_DIRECTORY}"
      fi

      # Handle blockchain - copy to docker directory
      mkdir -p "${CI_PROJECT_DIR}/docker/blockchain"
      if [[ -d "${HAF_DATA_DIRECTORY}/blockchain" ]] && [[ -n "$(ls -A "${HAF_DATA_DIRECTORY}/blockchain" 2>/dev/null)" ]]; then
        echo "Copying blockchain from cache to docker directory..."
        cp -aL "${HAF_DATA_DIRECTORY}/blockchain"/* "${CI_PROJECT_DIR}/docker/blockchain/"
      elif [[ -d "${BLOCK_LOG_SOURCE_DIR_5M}" ]]; then
        echo "Symlinking blockchain from source..."
        ln -sfn "${BLOCK_LOG_SOURCE_DIR_5M}/block_log" "${CI_PROJECT_DIR}/docker/blockchain/block_log"
        ln -sfn "${BLOCK_LOG_SOURCE_DIR_5M}/block_log.artifacts" "${CI_PROJECT_DIR}/docker/blockchain/block_log.artifacts"
      fi
      ls -la "${CI_PROJECT_DIR}/docker/blockchain/"

      echo -e "\e[0Ksection_end:$(date +%s):extract\r\e[0K"
    - !reference [.haf_app_dind_compose_startup, script]
    - !reference [.haf_app_dind_wait_for_services, script]
  after_script: !reference [.haf_app_dind_compose_teardown, after_script]
  artifacts:
    when: always
    paths:
      - docker/container-logs.tar.gz
    expire_in: 1 week
  tags:
    - public-runner-docker
    - data-cache-storage
    - fast

# Template for Tavern-based tests (uses centralized common-ci template)
.test-with-docker-compose-tavern:
  extends:
    - .docker_image_builder_job_template
    - .haf_app_dind_tavern_tests
  image: registry.gitlab.syncad.com/hive/reputation_tracker/ci-runner:docker-24.0.1-8
  variables:
    REPTRACKER_ADDRESS: localhost
    REPTRACKER_PORT: 3000
    PYTEST_WORKERS: "16"
  before_script:
    - !reference [.docker_image_builder_job_template, before_script]
    - |
      echo -e "\e[0Ksection_start:$(date +%s):login[collapsed=true]\r\e[0KLogging to Docker registry..."
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
      echo -e "\e[0Ksection_end:$(date +%s):login\r\e[0K"
    - !reference [.haf_app_dind_tavern_tests, before_script]
    - |
      echo -e "\e[0Ksection_start:$(date +%s):tests_api[collapsed=true]\r\e[0KCloning tests_api repository..."
      TESTS_API_DIR="${CI_PROJECT_DIR}/tests_api"
      rm -rf "$TESTS_API_DIR"
      git clone --depth 1 https://gitlab.syncad.com/hive/tests_api.git "$TESTS_API_DIR"
      # Install tests_api for validate_response module (required by tavern tests)
      # venv is in docker/ dir (created by compose_startup -> tavern_install_deps)
      . "${CI_PROJECT_DIR}/docker/venv/bin/activate"
      pip install -e "${CI_PROJECT_DIR}/tests_api"
      echo -e "\e[0Ksection_end:$(date +%s):tests_api\r\e[0K"
  tags:
    - public-runner-docker
    - data-cache-storage
    - fast

python_api_client_test:
  extends: .configuration_template
  stage: test
  needs:
  - job: generate_python_api_client
    artifacts: true
  variables:
    PYPROJECT_DIR: "${CI_PROJECT_DIR}/scripts/python_api_package"
  before_script:
  - !reference [.configuration_template, before_script]
  - poetry -C "${PYPROJECT_DIR}" lock
  - poetry -C "${PYPROJECT_DIR}" install
  script:
  - pytest "${PYPROJECT_DIR}/tests"
  tags:
  - public-runner-docker

regression-test:
  extends: .test-with-docker-compose
  stage: test
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):tests\r\e[0KRunning tests..."

    cd "${CI_PROJECT_DIR}/tests"
    # In DinD, PostgreSQL is available at 'docker' host
    ./account_dump_test.sh --host=docker

    echo -e "\e[0Ksection_end:$(date +%s):tests\r\e[0K"
  artifacts:
    paths:
    - tests/account_dump_test.log
    - docker/container-logs.tar.gz
    when: always

setup-scripts-test:
  extends: .test-with-docker-compose
  stage: test
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):tests\r\e[0KRunning tests..."

    cd "${CI_PROJECT_DIR}/tests/functional"
    # In DinD, PostgreSQL is available at 'docker' host
    ./test_scripts.sh --host=docker

    echo -e "\e[0Ksection_end:$(date +%s):tests\r\e[0K"
  artifacts:
    paths:
    - docker/container-logs.tar.gz
    when: always

performance-test:
  extends: .test-with-docker-compose
  stage: test
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):tests\r\e[0KRunning tests..."

    cd "${CI_PROJECT_DIR}"
    # In DinD, PostgREST is available at 'docker' host
    timeout -k 1m 10m ./tests/performance/run_performance_tests.sh --backend-host=docker
    tar -czvf tests/performance/results.tar.gz ${CI_PROJECT_DIR}/tests/performance/*result.*
    cat jmeter.log | python3 docker/ci/parse-jmeter-output.py
    m2u --input ${CI_PROJECT_DIR}/tests/performance/result.xml --output ${CI_PROJECT_DIR}/tests/performance/junit-result.xml

    echo -e "\e[0Ksection_end:$(date +%s):tests\r\e[0K"
  artifacts:
    paths:
    - docker/container-logs.tar.gz
    - tests/performance/result_report/
    - tests/performance/results.tar.gz
    - jmeter.log
    reports:
      junit: tests/performance/junit-result.xml

pattern-test:
  extends: .test-with-docker-compose-tavern
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  script:
  - |
    cd "${CI_PROJECT_DIR}"
    . docker/venv/bin/activate
    # Run pytest from project root so validate_response can write to correct paths
    REPTRACKER_ADDRESS=docker pytest -n ${PYTEST_WORKERS} --junitxml "${TAVERN_DIR}/report.xml" "${TAVERN_DIR}"
  artifacts:
    paths:
    - "**/*.out.json"
    - docker/container-logs.tar.gz
    reports:
      junit: tests/tavern/report.xml
    when: always

