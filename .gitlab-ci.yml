performance-test:
  extends: .test-with-docker-compose
  stage: test
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  script:
  - |
    echo -e "\e[0Ksection_start:$(date +%s):tests\r\e[0KRunning tests..."

    cd "${CI_PROJECT_DIR}"
    # In DinD, PostgREST is available at 'docker' host
    timeout -k 1m 10m ./tests/performance/run_performance_tests.sh --backend-host=docker
    tar -czvf tests/performance/results.tar.gz ${CI_PROJECT_DIR}/tests/performance/*result.*
    cat jmeter.log | python3 docker/ci/parse-jmeter-output.py
    m2u --input ${CI_PROJECT_DIR}/tests/performance/result.xml --output ${CI_PROJECT_DIR}/tests/performance/junit-result.xml

    echo -e "\e[0Ksection_end:$(date +%s):tests\r\e[0K"
  artifacts:
    paths:
    - docker/container-logs.tar.gz
    - tests/performance/result_report/
    - tests/performance/results.tar.gz
    - jmeter.log
    reports:
      junit: tests/performance/junit-result.xml

pattern-test:
  extends: .test-with-docker-compose
  stage: test
  needs:
  - job: sync
    artifacts: true
  - job: docker-setup-docker-image-build
    artifacts: true
  - job: prepare_haf_image
    artifacts: true
  - job: docker-ci-runner-build
    artifacts: true
  variables:
    JUNIT_REPORT: $CI_PROJECT_DIR/tests/tavern/report.xml
    REPTRACKER_ADDRESS: docker
    REPTRACKER_PORT: 3000
    TAVERN_DIR: $CI_PROJECT_DIR/tests/tavern
    PYTEST_NUMBER_OF_PROCESSES: 16
  before_script:
  - !reference [.test-with-docker-compose, before_script]
  - |
    echo -e "\e[0Ksection_start:$(date +%s):submodules[collapsed=true]\r\e[0KInitializing nested submodules for tests_api..."
    cd "${CI_PROJECT_DIR}"
    # Initialize only the specific nested submodules needed for tests_api
    # Using selective init avoids stale directory conflicts from full recursive init
    git -C haf submodule update --init hive
    git -C haf/hive submodule update --init tests/python/hive-local-tools/tests_api
    echo -e "\e[0Ksection_end:$(date +%s):submodules\r\e[0K"
  - |
    echo -e "\e[0Ksection_start:$(date +%s):venv[collapsed=true]\r\e[0KSetting up Python environment..."

    cd "${CI_PROJECT_DIR}"
    # Install test dependencies directly
    python3 -m venv venv/
    . venv/bin/activate

    echo "Installing test dependencies..."
    pip install tavern==2.2.0 pytest-xdist==3.2.0 pyyaml requests deepdiff==6.3.0 prettytable==3.8.0
    # Install tests_api for validate_response module (required by tavern tests)
    pip install -e "${CI_PROJECT_DIR}/haf/hive/tests/python/hive-local-tools/tests_api"

    echo -e "\e[0Ksection_end:$(date +%s):venv\r\e[0K"
  script:
  - |
    cd "${CI_PROJECT_DIR}"
    . venv/bin/activate
    cd tests/tavern
    # In DinD, PostgREST is available at 'docker' host
    REPTRACKER_ADDRESS=docker pytest -n $PYTEST_NUMBER_OF_PROCESSES --junitxml report.xml .
  artifacts:
    paths:
    - "**/*.out.json"
    - docker/container-logs.tar.gz
    reports:
      junit: tests/tavern/report.xml
    when: always

